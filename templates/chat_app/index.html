<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій GPT-чат</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 20px auto;
            padding: 0 12px;
            background: #f5f5f5;
        }
        h1 { text-align: center; }
        #chat {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            height: 60vh;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .msg {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .user {
            background: #d1e7ff;
            margin-left: auto;
            text-align: right;
        }
        .assistant {
            background: #e9e9e9;
            margin-right: auto;
        }
        form { display: flex; gap: 8px; }
        #message {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: default; }
        #clear { background: #999; }
    </style>
</head>
<body>
    <h1>Мій GPT-чат</h1>

    <div id="chat">
        {% for msg in messages %}
            <div class="msg {{ msg.role }}">{{ msg.content }}</div>
        {% endfor %}
    </div>

    <form id="chat-form">
        <input type="text" id="message" placeholder="Напишіть повідомлення..." autocomplete="off" required>
        <button type="submit" id="send-btn">Надіслати</button>
        <button type="button" id="clear">Очистити</button>
    </form>

    <script>
        // Дістаємо CSRF-токен (Django вимагає його для безпеки при POST-запитах)
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        const csrftoken = getCookie('csrftoken');

        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');

        // Додає бульбашку повідомлення на сторінку
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight; // прокрутка вниз
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);   // одразу показуємо повідомлення користувача
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '...';

            try {
                const res = await fetch('/send/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrftoken,
                    },
                    body: 'message=' + encodeURIComponent(text),
                });
                const data = await res.json();
                if (data.reply) {
                    addMessage('assistant', data.reply);
                } else {
                    addMessage('assistant', '⚠️ ' + (data.error || 'Помилка'));
                }
            } catch (err) {
                addMessage('assistant', '⚠️ Помилка зʼєднання');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Надіслати';
                input.focus();
            }
        });

        // Очищення історії
        document.getElementById('clear').addEventListener('click', async () => {
            await fetch('/clear/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrftoken },
            });
            chat.innerHTML = '';
        });

        // Прокрутка вниз при завантаженні (якщо вже є історія)
        chat.scrollTop = chat.scrollHeight;
    </script>
</body>
</html>
